services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blueduck
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: blueduck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U blueduck"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
